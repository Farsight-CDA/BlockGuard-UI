---
version: '2.0'
services:
  softether:
    image: leonmw/softethervpn
    expose:
      - port: 443
        as: 443
        to:
          - global: true
    env:
      - INPUT=FarsightCDA
      - USER=PLACEHOLDER_USER
      - PASSWORD=PLACEHOLDER_PASSWORD
profiles:
  compute:
    softether:
      resources:
        cpu:
          units: 0.8
        memory:
          size: 512Mi
        storage:
          - size: 512Mi
        gpu:
          units: 0
  placement:
    akash:
      pricing:
        softether:
          denom: uakt
          amount: 10000
deployment:
  softether:
    akash:
      profile: softether
      count: 1
