---
version: '2.0'
services:
  softether:
    image: leonmw/softeathervpn
    expose:
      - port: 443
        as: 443
        to:
          - global: true
    env:
      - INPUT=FarsightCDA
      - USER=PLACEHOLDER_USER
      - PASSWORD=PLACEHOLDER_PASSWORD
profiles:
  compute:
    softether:
      resources:
        cpu:
          units: 0.8
        memory:
          size: 512Mi
        storage:
          - size: 512Mi
  placement:
    akash:
      pricing:
        softether:
          denom: uakt
          amount: 10000
      signedBy:
        anyOf:
          - akash1365yvmc4s7awdyj3n2sav7xfx76adc6dnmlx63
          - akash18qa2a2ltfyvkyj0ggj3hkvuj6twzyumuaru9s4
deployment:
  softether:
    akash:
      profile: softether
      count: 1
